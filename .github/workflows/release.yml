name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            arch: arm64
            os: macos-26
            command: npx electron-builder --mac dmg zip --arm64 --publish never
            artifact: material-organizer-macos-arm64
          - platform: mac
            arch: x64
            os: macos-26-intel
            command: npx electron-builder --mac dmg zip --x64 --publish never
            artifact: material-organizer-macos-x64
          - platform: windows
            arch: x64
            os: windows-latest
            command: npx electron-builder --win nsis zip --x64 --publish never
            artifact: material-organizer-windows-x64
          - platform: linux
            arch: x64
            os: ubuntu-latest
            command: npx electron-builder --linux AppImage deb --x64 --publish never
            artifact: material-organizer-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run browsers:install
      - run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.zip
            artifacts/**/*.blockmap
            artifacts/**/*.yml
